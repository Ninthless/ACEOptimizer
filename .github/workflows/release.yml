name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '.github/**'

env:
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from .csproj
        id: version
        run: |
          [xml]$csproj = Get-Content "ACEOptimizer.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          if (-not $version) {
            $version = "1.0.0"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Check if tag exists
        id: check_tag
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $exists = git tag -l $tag
          if ($exists) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Skip if tag already exists
        if: steps.check_tag.outputs.EXISTS == 'true'
        run: |
          echo "Version ${{ steps.version.outputs.TAG }} already exists. Skipping release."
          echo "To create a new release, update the version in ACEOptimizer.csproj"

      - name: Build and Release
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          echo "Building version ${{ steps.version.outputs.VERSION }}"

      - name: Restore dependencies
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: dotnet restore

      - name: Build
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: dotnet publish --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Setup Inno Setup
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: choco install innosetup -y

      - name: Build installer
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $pwd = $PWD -replace '\\', '/'
          iscc installer/installer.iss `
            /DAppVersion="$version" `
            /DOutputDir="$pwd" `
            /DSourceDir="$pwd" `
            /DOutputBaseFilename="ACEOptimizer_Setup_v$version"
        shell: pwsh

      - name: Create portable archive
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          Compress-Archive -Path ./publish/ACEOptimizer.exe -DestinationPath ./ACEOptimizer_Portable_v${{ steps.version.outputs.VERSION }}.zip
        shell: pwsh

      - name: Generate release notes
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $previousTag = git tag --sort=-version:refname | Select-Object -First 1

          if ($previousTag) {
            $range = "$previousTag..HEAD"
            $compareUrl = "https://github.com/$repo/compare/$previousTag...$tag"
          } else {
            $range = "HEAD"
            $compareUrl = "https://github.com/$repo/commits/$tag"
          }

          $commits = git log $range --pretty=format:"%s" --no-merges |
            Where-Object {
              $_ -and
              $_ -notmatch '^chore:\s*bump version\b' -and
              $_ -notmatch '^chore:\s*trigger release\b'
            } |
            ForEach-Object { "- $_" }

          if (-not $commits) {
            $commits = @("- 常规维护与构建更新")
          }

          $notes = @"
          ## ACE Optimizer $tag

          ### 更新内容
          $($commits -join "`r`n")

          ### 下载

          | 文件 | 说明 |
          |------|------|
          | ACEOptimizer_Setup_v$version.exe | 安装程序 |
          | ACEOptimizer_Portable_v$version.zip | 便携版 |

          ### 完整变更
          - [查看完整对比]($compareUrl)

          ---

          **作者**: [@Ninthless](https://github.com/Ninthless)
          "@

          Set-Content -Path RELEASE_NOTES.md -Value $notes -Encoding UTF8
        shell: pwsh

      - name: Create tag
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.TAG }} -m "Release ${{ steps.version.outputs.VERSION }}"
          git push origin ${{ steps.version.outputs.TAG }}
        shell: pwsh

      - name: Create Release
        if: steps.check_tag.outputs.EXISTS != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ACE Optimizer ${{ steps.version.outputs.TAG }}
          body_path: RELEASE_NOTES.md
          files: |
            ACEOptimizer_Setup_*.exe
            ACEOptimizer_Portable_*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
