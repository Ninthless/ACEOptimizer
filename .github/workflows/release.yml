name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update version in .csproj
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $csproj = "ACEOptimizer.csproj"
          (Get-Content $csproj) `
            -replace '<Version>.*</Version>', "<Version>$version</Version>" `
            -replace '<AssemblyVersion>.*</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>" `
            -replace '<FileVersion>.*</FileVersion>', "<FileVersion>$version.0</FileVersion>" |
            Set-Content $csproj
        shell: pwsh

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Setup Inno Setup
        uses: noprint/setup-innosetup@v1

      - name: Build installer
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          iscc installer/installer.iss `
            /DAppVersion="$version" `
            /DOutputDir="." `
            /DSourceDir="." `
            /DOutputBaseFilename="ACEOptimizer_Setup_v$version"
        shell: pwsh

      - name: Create portable archive
        run: |
          Compress-Archive -Path ./publish/ACEOptimizer.exe -DestinationPath ./ACEOptimizer_Portable_v${{ steps.version.outputs.VERSION }}.zip
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ACE Optimizer v${{ steps.version.outputs.VERSION }}
          body: |
            ## 🚀 ACE Optimizer v${{ steps.version.outputs.VERSION }}
            
            ### 下载
            
            | 文件 | 说明 |
            |------|------|
            | `ACEOptimizer_Setup_v${{ steps.version.outputs.VERSION }}.exe` | 安装程序 |
            | `ACEOptimizer_Portable_v${{ steps.version.outputs.VERSION }}.zip` | 便携版 |
            
            ---
            
            **作者**: [@Ninthless](https://github.com/Ninthless)
          files: |
            ACEOptimizer_Setup_*.exe
            ACEOptimizer_Portable_*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
