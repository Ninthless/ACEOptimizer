name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '.github/**'

env:
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from .csproj
        id: version
        run: |
          [xml]$csproj = Get-Content "ACEOptimizer.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          if (-not $version) {
            $version = "1.0.0"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Check if tag exists
        id: check_tag
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $exists = git tag -l $tag
          if ($exists) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Skip if tag already exists
        if: steps.check_tag.outputs.EXISTS == 'true'
        run: |
          echo "Version ${{ steps.version.outputs.TAG }} already exists. Skipping release."
          echo "To create a new release, update the version in ACEOptimizer.csproj"

      - name: Build and Release
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          echo "Building version ${{ steps.version.outputs.VERSION }}"

      - name: Restore dependencies
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: dotnet restore

      - name: Build
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: dotnet publish --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Setup Inno Setup
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: choco install innosetup -y

      - name: Build installer
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $pwd = $PWD -replace '\\', '/'
          iscc installer/installer.iss `
            /DAppVersion="$version" `
            /DOutputDir="$pwd" `
            /DSourceDir="$pwd" `
            /DOutputBaseFilename="ACEOptimizer_Setup_v$version"
        shell: pwsh

      - name: Create portable archive
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          Compress-Archive -Path ./publish/ACEOptimizer.exe -DestinationPath ./ACEOptimizer_Portable_v${{ steps.version.outputs.VERSION }}.zip
        shell: pwsh

      - name: Create tag
        if: steps.check_tag.outputs.EXISTS != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.TAG }} -m "Release ${{ steps.version.outputs.VERSION }}"
          git push origin ${{ steps.version.outputs.TAG }}
        shell: pwsh

      - name: Create Release
        if: steps.check_tag.outputs.EXISTS != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ACE Optimizer ${{ steps.version.outputs.TAG }}
          body: |
            ## 🚀 ACE Optimizer ${{ steps.version.outputs.TAG }}
            
            ### 📦 下载
            
            | 文件 | 说明 |
            |------|------|
            | `ACEOptimizer_Setup_v${{ steps.version.outputs.VERSION }}.exe` | 安装程序 |
            | `ACEOptimizer_Portable_v${{ steps.version.outputs.VERSION }}.zip` | 便携版 |
            
            ---
            
            **作者**: [@Ninthless](https://github.com/Ninthless)
          files: |
            ACEOptimizer_Setup_*.exe
            ACEOptimizer_Portable_*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
